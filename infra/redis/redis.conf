# Redis configuration file
# Bind to all interfaces in Docker
bind 0.0.0.0

# Port
port 6379

# Set maximum memory (adjust based on your server capacity, 256MB is a safe minimum)
maxmemory 256mb

# Policy when max memory is reached (volatile-lru is good for caching + short-lived sessions)
maxmemory-policy allkeys-lru

# Disable RDB persistence if used purely as a transient cache,
# OR enable AOF (Append Only File) if you need durability for queues/sessions.
# For typical caching scenarios in Next.js + Workers:
appendonly yes
appendfsync everysec

# Limit client output buffer
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit pubsub 32mb 8mb 60
